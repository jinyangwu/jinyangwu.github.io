{% if site.visitor_map.enabled %}
<div class="visitor-map-card" data-visitor-endpoint="{{ site.visitor_map.endpoint }}">
  <div class="visitor-map-head">
    <div>
      <span class="visitor-kicker">Visitors</span>
      <strong><span id="visitor-total">--</span> visits</strong>
    </div>
    <span id="visitor-status" class="visitor-status">Connecting</span>
  </div>
  <div class="visitor-map-stage" aria-label="Visitor map">
    <svg class="visitor-world" viewBox="0 0 1000 520" role="img" aria-hidden="true">
      <path d="M117 156 L203 104 L293 124 L346 178 L306 235 L214 221 L149 244 L93 211 Z"></path>
      <path d="M238 253 L319 265 L353 338 L329 426 L280 468 L233 409 L204 326 Z"></path>
      <path d="M436 153 L512 105 L604 125 L639 178 L590 222 L494 213 L427 198 Z"></path>
      <path d="M512 241 L608 234 L665 300 L639 410 L574 444 L521 379 L486 304 Z"></path>
      <path d="M650 145 L780 104 L904 148 L930 232 L832 277 L713 248 L624 196 Z"></path>
      <path d="M727 314 L829 300 L910 351 L866 414 L760 412 L690 365 Z"></path>
    </svg>
    <div id="visitor-points" class="visitor-points"></div>
  </div>
  <div id="visitor-list" class="visitor-list"></div>
</div>
{% endif %}
